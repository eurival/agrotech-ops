apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgis-pvc
  namespace: agrotech
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-vm-storage
  resources:
    requests:
      storage: 80Gi # 🔥 ATUALIZADO: Igualado com a realidade do Longhorn para o ArgoCD não reclamar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgis
  namespace: agrotech
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgis
  template:
    metadata:
      labels:
        app: postgis
    spec:
      terminationGracePeriodSeconds: 120 
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
      - name: postgis
        image: eurival/postgis-agrotech:15-3.3-vector
        imagePullPolicy: Always

        # =========================================================
        # 🔥 TUNING EXTREMO POSTGIS + FTS (24 Cores + NVMe)
        # =========================================================
        args:
          # --- MEMÓRIA (O Cache) ---
          - "-c"
          - "shared_buffers=4GB"          # Índice FTS inteiro na memória
          - "-c"
          - "work_mem=128MB"              # FTS pesado não vai usar disco
          - "-c"
          - "maintenance_work_mem=1GB"    # 1GB para fazer o REINDEX voar
          - "-c"
          - "effective_cache_size=12GB"   # Avisa ao K8s para usar a RAM livre
          
          # --- DISCO (NVMe + Longhorn Local) ---
          - "-c"
          - "random_page_cost=1.1"        # Força o uso do índice GIN
          - "-c"
          - "effective_io_concurrency=200"# Tira proveito do paralelismo do NVMe
          
          # --- CPU (O Poder dos 24 Núcleos) ---
          - "-c"
          - "max_worker_processes=16"         # Limite total de workers
          - "-c"
          - "max_parallel_workers=8"          # Workers liberados em background
          - "-c"
          - "max_parallel_workers_per_gather=4" # 4 Núcleos quebrando a MESMA query de FTS simultaneamente!
          
          # --- REPLICAÇÃO ---
          - "-c"
          - "max_wal_size=4GB"     
          - "-c"
          - "log_timezone=America/Sao_Paulo"       

        securityContext:
          runAsUser: 999
          runAsGroup: 999

        env:
        - name: TZ
          value: "America/Sao_Paulo"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        - name: POSTGRES_USER
          value: "agro_admin"
        - name: POSTGRES_DB
          value: "agrotech_db"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgis-secret
              key: POSTGRES_PASSWORD

        ports:
        - containerPort: 5432

        # =========================================================
        # 🛡️ RECURSOS (QoS Ajustado para IA/GIS/FTS)
        # =========================================================
        resources:
          requests:
            memory: "8Gi"    # 🔥 ATUALIZADO: Fôlego garantido
            cpu: "4000m"     # 🔥 ATUALIZADO: 4 Cores dedicados na base
            ephemeral-storage: "1Gi"
          limits:
            memory: "16Gi"   # 🔥 ATUALIZADO: Teto alto para evitar OOMKilled
            cpu: "12000m"    # 🔥 ATUALIZADO: Até 12 Cores no pico de FTS
            ephemeral-storage: "2Gi"

        readinessProbe:
          exec:
            command: ["bash", "-lc", "pg_isready -U agro_admin -d agrotech_db -h 127.0.0.1 -p 5432"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6

        livenessProbe:
          exec:
            command: ["bash", "-lc", "pg_isready -U agro_admin -d agrotech_db -h 127.0.0.1 -p 5432"]
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6

        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgis-storage
        - mountPath: /dev/shm
          name: dshm

      volumes:
      - name: postgis-storage
        persistentVolumeClaim:
          claimName: postgis-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgis-svc
  namespace: agrotech
spec:
  type: NodePort
  selector:
    app: postgis
  ports:
  - port: 5432
    targetPort: 5432
    nodePort: 30432